<!-- Hero Example 2: photo background -->
<section class="relative min-h-[88vh] overflow-hidden px-6 pb-20 pt-28 text-center md:min-h-[95vh] md:pt-40">
  <div class="pointer-events-none absolute inset-0 -z-10" aria-hidden="true">
    <img
      src="/assets/src/images/kpugy2kpugy2kpug.png"
      alt=""
      class="h-full w-full object-cover object-[68%_0%] grayscale"
      loading="eager" />
  </div>

  <div class="relative mx-auto max-w-2xl">
    <h1 class="text-4xl font-semibold tracking-tight md:text-5xl">{{ page.title }}</h1>
    <p class="mx-auto mt-4 max-w-[40ch] text-base text-stone-600 md:text-lg">
      {{ page.description }}
    </p>
  </div>
</section>
