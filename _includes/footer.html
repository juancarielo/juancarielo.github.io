<footer class="border-t border-stone-200 px-6 py-10">
  <div class="mx-auto flex max-w-5xl items-center justify-between">
    <ul class="flex items-center gap-4 text-xs">
       {% for item in site.data.menu %}

         {% assign current = item.link | split:'/' %}

          <li class="nav-item{% if page.url == item.link or page.url contains current[1] %} underline{% endif %}">
            <a class="hover:text-stone-600 hover:underline" href="{{ item.link }}">
              {{ item.name }}
            </a>
          </li>

        {% endfor %}
    </ul>
    <p class="text-xs ">
      {{ site.name }} © {{ "now" | date: "%Y" }}
      <br>
      <small>Made with <a href="https://jekyllrb.com/" rel="noopener" target="_blank" class="hover:text-stone-600 hover:underline">Jekyll</a>.</small>
    </p>
  </div>
</footer>
