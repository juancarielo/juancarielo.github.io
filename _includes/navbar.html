{% assign linkedin = site.data.social | where: 'name', 'LinkedIn' | first %}
{% assign github = site.data.social | where: 'name', 'Github' | first %}

<header class="absolute inset-x-0 top-0 z-10 px-6 py-5">
  <div class="mx-auto flex max-w-5xl items-center justify-between">
    <a
      href="/"
      aria-label="Juan Carielo"
      class="inline-flex h-16 w-16 items-center justify-center rounded-full bg-stone-900 text-xl font-semibold tracking-tight text-stone-50">
      JC
    </a>
    <div class="flex items-center gap-2">
      {% if github %}
        <a
          href="{{ github.link }}"
          rel="noopener"
          target="_blank"
          aria-label="GitHub"
          class="inline-flex h-10 w-10 items-center justify-center rounded-full text-stone-900 transition hover:bg-stone-900/5 hover:text-stone-900">
          <svg
            viewBox="0 0 24 24"
            class="h-[24px] w-[24px]"
            fill="currentColor"
            aria-hidden="true">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.333-1.754-1.333-1.754-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.305.762-1.605-2.665-.305-5.467-1.334-5.467-5.93 0-1.31.469-2.38 1.236-3.22-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.91 1.235 3.22 0 4.61-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222 0 1.606-.014 2.898-.014 3.293 0 .322.216.694.825.576C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
          </svg>
        </a>
      {% endif %}
      {% if linkedin %}
        <a
          href="{{ linkedin.link }}"
          rel="noopener"
          target="_blank"
          aria-label="LinkedIn"
          class="inline-flex h-10 w-10 items-center justify-center rounded-full text-stone-900 transition hover:bg-stone-900/5 hover:text-stone-900">
          <svg
            viewBox="0 0 24 24"
            class="h-[24px] w-[24px]"
            fill="currentColor"
            aria-hidden="true">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
          </svg>
        </a>
      {% endif %}
    </div>
  </div>
</header>
